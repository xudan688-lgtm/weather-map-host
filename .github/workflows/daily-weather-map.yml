name: Daily US Weather Map

on:
  schedule:
    - cron: "50 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pillow

      - name: Generate and send
        env:
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
          GITHUB_PAGES_OWNER: xudan688-lgtm
          GITHUB_PAGES_REPO: weather-map-host
          GITHUB_PAGES_BRANCH: main
          GITHUB_PAGES_BASE_URL: https://xudan688-lgtm.github.io/weather-map-host/
          GITHUB_PAGES_TOKEN: ${{ github.token }}
        run: |
          python weather_map_automation/generate_us_weather_map.py --upload-github-pages --send-dingtalk
          python weather_map_automation/generate_us_15day_heatmap.py --upload-github-pages --send-dingtalk
